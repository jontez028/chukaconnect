<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChukaConnect — Campus Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc, query, orderBy, serverTimestamp, where, deleteDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPTeMioI10_3LXqcRDzjf8lQtiGUCAWVA",
    authDomain: "chukaconnect-34699.firebaseapp.com",
    projectId: "chukaconnect-34699",
    storageBucket: "chukaconnect-34699.firebasestorage.app",
    messagingSenderId: "316543740776",
    appId: "1:316543740776:web:8dbba2db6a558f3636c4dd",
    measurementId: "G-TZWXPQWBWX"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.fbAuth = auth;
  window.fbDb = db;
  window.fbFns = { createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, collection, addDoc, getDocs, getDoc, doc, updateDoc, query, orderBy, serverTimestamp, where, deleteDoc };

  onAuthStateChanged(auth, async (user) => {
    if (!user) { showPage('landing'); return; }
    try {
      const q = query(collection(db,'users'), where('uid','==',user.uid));
      const snap = await getDocs(q);
      if (!snap.empty) {
        const profile = snap.docs[0].data();
        window.currentUser = { ...profile, docId: snap.docs[0].id };
        routeToDashboard(profile.role);
      } else {
        window.currentUser = { uid: user.uid, email: user.email };
        showPage('landing');
      }
    } catch(e) { showPage('landing'); }
  });
</script>

<style>
:root{--primary:#6C63FF;--primary-dark:#4B44CC;--primary-light:#A89DFF;--accent:#38BDF8;--accent2:#A855F7;--green:#22C55E;--red:#EF4444;--orange:#F97316;--dark:#09090F;--dark2:#0F0F1A;--dark3:#161628;--card:#12121F;--text:#EEF0FF;--text-muted:#7B82A8;--text-dim:#3D4170;--border:rgba(108,99,255,0.18);--border-hover:rgba(108,99,255,0.45);--glow:0 0 30px rgba(108,99,255,0.2);--shadow:0 8px 32px rgba(0,0,0,0.5);--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;line-height:1.6;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--dark2);}::-webkit-scrollbar-thumb{background:var(--primary-dark);border-radius:3px;}
.page{display:none;min-height:100vh;}.page.active{display:block;}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.3rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all 0.25s;}
.btn-primary{background:var(--primary);color:#fff;font-weight:600;}.btn-primary:hover{background:var(--primary-light);transform:translateY(-1px);}
.btn-outline{background:transparent;border:1.5px solid var(--border-hover);color:var(--text);}.btn-outline:hover{border-color:var(--primary);color:var(--primary);}
.btn-green{background:var(--green);color:#fff;font-weight:600;}.btn-red{background:var(--red);color:#fff;font-weight:600;}.btn-orange{background:var(--orange);color:#fff;font-weight:600;}
.btn-lg{padding:0.9rem 2rem;font-size:1rem;border-radius:12px;}.btn-sm{padding:0.35rem 0.8rem;font-size:0.78rem;border-radius:7px;}.btn:disabled{opacity:0.6;cursor:not-allowed!important;transform:none!important;}
.form-group{margin-bottom:1rem;}.form-label{font-size:0.82rem;font-weight:500;color:var(--text-muted);margin-bottom:0.4rem;display:block;}
.form-input{width:100%;background:var(--dark3);border:1.5px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}.form-input:focus{border-color:var(--primary);}.form-input::placeholder{color:var(--text-dim);}
.form-select{width:100%;background:var(--dark3);border:1.5px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;appearance:none;cursor:pointer;}.form-select:focus{border-color:var(--primary);}
.form-textarea{width:100%;background:var(--dark3);border:1.5px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;resize:none;height:90px;}.form-textarea:focus{border-color:var(--primary);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}.form-error{font-size:0.78rem;color:var(--red);margin-top:0.4rem;display:none;padding:0.5rem 0.75rem;background:rgba(239,68,68,0.1);border-radius:8px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;}
.dash-shell{display:flex;min-height:100vh;}
.sidebar{width:260px;background:var(--dark2);border-right:1px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:0.25rem;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:100;transition:transform 0.3s;}
.sidebar-logo{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--primary);padding:0.5rem 0.75rem 1.25rem;}
.sidebar-logo span{color:var(--text);}
.sidebar-section{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);padding:0.75rem 0.75rem 0.25rem;margin-top:0.5rem;}
.nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 0.75rem;border-radius:10px;cursor:pointer;color:var(--text-muted);font-size:0.88rem;font-weight:500;transition:all 0.2s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:rgba(108,99,255,0.08);color:var(--text);}.nav-item.active{background:rgba(108,99,255,0.15);color:var(--primary);font-weight:600;}
.nav-icon{font-size:1.1rem;width:22px;text-align:center;}.nav-badge{background:var(--red);color:#fff;font-size:0.65rem;font-weight:700;padding:0.1rem 0.4rem;border-radius:100px;margin-left:auto;}
.sidebar-bottom{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);}
.sidebar-user{display:flex;align-items:center;gap:0.75rem;padding:0.75rem;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;flex-shrink:0;}
.user-name{font-size:0.85rem;font-weight:600;line-height:1.2;}.user-role{font-size:0.7rem;color:var(--text-muted);}
.dash-main{margin-left:260px;flex:1;padding:2rem;min-height:100vh;}
.dash-panel{display:none;}.dash-panel.active{display:block;}
.dash-header{margin-bottom:2rem;}.dash-header h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:0.25rem;}.dash-header p{color:var(--text-muted);font-size:0.9rem;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;}
.stat-num{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--primary);line-height:1;}.stat-label{font-size:0.78rem;color:var(--text-muted);margin-top:0.25rem;}
.stat-card.green .stat-num{color:var(--green);}.stat-card.orange .stat-num{color:var(--orange);}.stat-card.blue .stat-num{color:var(--accent);}
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:1.25rem;}
.listing-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.3s;}
.listing-card:hover{border-color:var(--border-hover);transform:translateY(-3px);box-shadow:var(--glow);}
.lcard-img{height:150px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--dark3);}
.lcard-img img{width:100%;height:100%;object-fit:cover;}.emoji-big{font-size:3rem;}
.pill{position:absolute;top:8px;right:8px;padding:0.18rem 0.55rem;border-radius:100px;font-size:0.65rem;font-weight:700;}
.pill-approved{background:rgba(34,197,94,0.2);color:var(--green);}.pill-pending{background:rgba(249,115,22,0.2);color:var(--orange);}
.pill-open{background:rgba(108,99,255,0.2);color:var(--primary);}.pill-rejected{background:rgba(239,68,68,0.2);color:var(--red);}
.lcard-body{padding:1rem;}.lcard-body h4{font-family:'Syne',sans-serif;font-size:0.93rem;font-weight:700;margin-bottom:0.2rem;}
.lcard-sub{font-size:0.77rem;color:var(--text-muted);margin-bottom:0.5rem;}.lcard-actions{display:flex;gap:0.5rem;margin-top:0.75rem;flex-wrap:wrap;}
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:1.25rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;background:var(--dark3);}
.upload-area:hover{border-color:var(--primary);background:rgba(108,99,255,0.05);}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-preview{width:100%;height:130px;object-fit:cover;border-radius:10px;margin-top:0.75rem;display:none;}
.progress-wrap{display:none;margin-top:0.75rem;}.progress-track{background:var(--dark2);border-radius:100px;height:6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent2));border-radius:100px;transition:width 0.3s;width:0%;}
.progress-label{font-size:0.72rem;color:var(--text-muted);margin-top:0.3rem;text-align:center;}
.amenities-wrap{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem;}
.amenity-label{display:flex;align-items:center;gap:0.4rem;font-size:0.82rem;cursor:pointer;background:var(--dark3);border:1px solid var(--border);padding:0.3rem 0.7rem;border-radius:8px;transition:all 0.2s;}
.amenity-label input{accent-color:var(--primary);}.amenity-label:hover{border-color:var(--primary);}
.data-table{width:100%;border-collapse:collapse;font-size:0.85rem;}
.data-table th{text-align:left;padding:0.75rem 1rem;font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border);}
.data-table td{padding:0.85rem 1rem;border-bottom:1px solid rgba(108,99,255,0.07);vertical-align:middle;}
.data-table tr:hover td{background:rgba(108,99,255,0.04);}
.status-badge{padding:0.2rem 0.6rem;border-radius:100px;font-size:0.72rem;font-weight:700;display:inline-block;}
.empty{text-align:center;padding:3rem 1rem;color:var(--text-muted);grid-column:1/-1;}
.empty .ei{font-size:3rem;margin-bottom:0.75rem;}.empty p{font-size:0.9rem;margin-bottom:1rem;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(108,99,255,0.3);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-block{text-align:center;padding:3rem;color:var(--text-muted);grid-column:1/-1;}
.toast{position:fixed;bottom:2rem;right:2rem;z-index:3000;background:var(--card);border:1px solid var(--primary);border-radius:12px;padding:1rem 1.5rem;display:flex;align-items:center;gap:0.75rem;box-shadow:var(--shadow);max-width:340px;transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.toast.show{transform:translateX(0);}.toast-msg strong{display:block;font-weight:600;font-size:0.9rem;}.toast-msg span{font-size:0.82rem;color:var(--text-muted);}

/* LANDING */
#page-landing{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:var(--dark);}
.landing-wrap{width:100%;max-width:420px;position:relative;z-index:1;}
.landing-logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--primary);text-align:center;margin-bottom:0.35rem;}
.landing-logo span{color:var(--text);}
.landing-tag{text-align:center;color:var(--text-muted);font-size:0.88rem;margin-bottom:1.75rem;}
.auth-tabs{display:flex;background:var(--dark2);border-radius:12px;padding:4px;margin-bottom:1.5rem;}
.auth-tab{flex:1;padding:0.6rem;text-align:center;border-radius:9px;cursor:pointer;font-size:0.88rem;font-weight:500;color:var(--text-muted);border:none;background:none;transition:all 0.2s;}
.auth-tab.active{background:var(--primary);color:#fff;font-weight:600;}
.auth-panel{display:none;}.auth-panel.active{display:block;}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:1.25rem;}
.role-card{background:var(--dark3);border:2px solid var(--border);border-radius:12px;padding:1rem 0.5rem;text-align:center;cursor:pointer;transition:all 0.2s;}
.role-card:hover,.role-card.selected{border-color:var(--primary);background:rgba(108,99,255,0.1);}
.role-icon{font-size:1.8rem;margin-bottom:0.4rem;}.role-name{font-size:0.78rem;font-weight:600;color:var(--text-muted);}
.role-card.selected .role-name{color:var(--primary);}
.submit-btn{width:100%;background:var(--primary);border:none;border-radius:10px;padding:0.9rem;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.2s;margin-top:0.25rem;}
.submit-btn:hover{background:var(--primary-light);}.submit-btn:disabled{opacity:0.6;cursor:not-allowed;}

.sidebar-toggle{display:none;position:fixed;top:1rem;left:1rem;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;border:none;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}.sidebar-toggle{display:flex;}
  .dash-main{margin-left:0;padding:1.25rem;padding-top:4.5rem;}
  .form-row{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
@media(max-width:520px){
  .listings-grid{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr;}
  .dash-header h1{font-size:1.4rem;}
}
</style>
</head>
<body>

<!-- ══ LANDING / AUTH ══ -->
<div id="page-landing" class="page active">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(108,99,255,0.12),transparent 70%);pointer-events:none"></div>
  <div class="landing-wrap">
    <div class="landing-logo">Chuka<span>Connect</span></div>
    <p class="landing-tag">Hostels · Food · Shops · Boda Boda · Payments</p>
    <div class="card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
        <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
      </div>
      <!-- LOGIN -->
      <div id="auth-login" class="auth-panel active">
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="li_email" type="email" placeholder="you@chuka.ac.ke"></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="li_pw" type="password" placeholder="Your password"></div>
        <div class="form-error" id="li_err"></div>
        <button class="submit-btn" id="li_btn" onclick="doLogin()">Log In to ChukaConnect</button>
        <p style="text-align:center;font-size:0.78rem;color:var(--text-muted);margin-top:1rem">No account? <a href="#" onclick="switchTab('signup')" style="color:var(--primary)">Sign up free →</a></p>
      </div>
      <!-- SIGN UP -->
      <div id="auth-signup" class="auth-panel">
        <div class="form-group">
          <label class="form-label">I am a</label>
          <div class="role-grid">
            <div class="role-card selected" onclick="pickRole(this,'student')"><div class="role-icon">🎓</div><div class="role-name">Student</div></div>
            <div class="role-card" onclick="pickRole(this,'business')"><div class="role-icon">🏪</div><div class="role-name">Business</div></div>
            <div class="role-card" onclick="pickRole(this,'rider')"><div class="role-icon">🏍️</div><div class="role-name">Rider</div></div>
          </div>
          <input type="hidden" id="su_role" value="student">
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">First Name *</label><input class="form-input" id="su_fn" placeholder="John"></div>
          <div class="form-group"><label class="form-label">Last Name *</label><input class="form-input" id="su_ln" placeholder="Kamau"></div>
        </div>
        <div class="form-group"><label class="form-label">Email *</label><input class="form-input" id="su_email" type="email" placeholder="you@chuka.ac.ke"></div>
        <div class="form-group"><label class="form-label">M-Pesa Phone</label><input class="form-input" id="su_phone" type="tel" placeholder="0712 345 678"></div>
        <div class="form-group"><label class="form-label">Password * (min 6 chars)</label><input class="form-input" id="su_pw" type="password" placeholder="Create a password"></div>
        <div class="form-error" id="su_err"></div>
        <button class="submit-btn" id="su_btn" onclick="doSignUp()">Create My Account</button>
        <p style="text-align:center;font-size:0.78rem;color:var(--text-muted);margin-top:1rem">Already registered? <a href="#" onclick="switchTab('login')" style="color:var(--primary)">Log in →</a></p>
      </div>
    </div>
  </div>
</div>

<!-- ══ DASHBOARD SHELL ══ -->
<div id="page-dashboard" class="page">
  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">Chuka<span>Connect</span></div>
    <div id="sidebarNav"></div>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar" id="sbAvatar">U</div>
        <div><div class="user-name" id="sbName">—</div><div class="user-role" id="sbRole">—</div></div>
      </div>
      <button class="nav-item" onclick="doLogout()" style="color:var(--red)"><span class="nav-icon">🚪</span> Log Out</button>
    </div>
  </div>
  <div class="dash-main" id="dashMain"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="tIcon" style="font-size:1.4rem">✅</span>
  <div class="toast-msg"><strong id="tTitle"></strong><span id="tBody"></span></div>
</div>

<script>
// ══ CONFIG ══
const CC = 'ddqizc83f', CP = 'uz6jp648';
const ADMIN_EMAIL = 'johnnjenga9097@gmail.com';
const CAT = {
  food:{e:'🍽️',c:'rgba(108,99,255,0.15)',l:'Food'},
  mama_mboga:{e:'🥦',c:'rgba(56,189,248,0.15)',l:'Groceries'},
  chemist:{e:'💊',c:'rgba(168,85,247,0.15)',l:'Chemist'},
  shop:{e:'🛍️',c:'rgba(108,99,255,0.12)',l:'Shop'},
  hostel:{e:'🏠',c:'rgba(56,189,248,0.12)',l:'Hostel'},
  boda:{e:'🏍️',c:'rgba(168,85,247,0.12)',l:'Boda Boda'},
  salon:{e:'✂️',c:'rgba(108,99,255,0.12)',l:'Salon'},
  other:{e:'📌',c:'rgba(56,189,248,0.12)',l:'Other'},
};

// ══ PAGE UTILS ══
const showPage = n => { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById('page-'+n)?.classList.add('active'); };
const switchTab = t => { document.querySelectorAll('.auth-tab').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.auth-panel').forEach(x=>x.classList.remove('active')); document.querySelector(`.auth-tab[onclick*="${t}"]`).classList.add('active'); document.getElementById('auth-'+t).classList.add('active'); };
const pickRole = (el,r) => { document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); document.getElementById('su_role').value=r; };
const toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sbOverlay').classList.toggle('open'); };
const showPanel = (id,nav) => { document.querySelectorAll('.dash-panel').forEach(p=>p.classList.remove('active')); document.getElementById(id)?.classList.add('active'); if(nav){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));nav.classList.add('active');} document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbOverlay').classList.remove('open'); };
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const showToast = (icon,title,body) => { document.getElementById('tIcon').textContent=icon; document.getElementById('tTitle').textContent=title; document.getElementById('tBody').textContent=body; const t=document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),4500); };
const showErr = (id,msg) => { const e=document.getElementById(id); e.textContent=msg; e.style.display='block'; };

// ══ ROUTER ══
function routeToDashboard(role) {
  const u = window.currentUser;
  const r = u.email===ADMIN_EMAIL?'admin':role;
  u.effectiveRole = r;
  const n = u.name||u.email?.split('@')[0]||'User';
  document.getElementById('sbName').textContent = n;
  document.getElementById('sbAvatar').textContent = n[0].toUpperCase();
  const rMap = {student:'🎓 Student',business:'🏪 Business Owner',rider:'🏍️ Boda Rider',admin:'⚙️ Admin'};
  document.getElementById('sbRole').textContent = rMap[r]||r;
  if(r==='student') buildStudent();
  else if(r==='business') buildBusiness();
  else if(r==='rider') buildRider();
  else if(r==='admin') buildAdmin();
  showPage('dashboard');
}

// ══ AUTH ══
async function doLogin() {
  const email=document.getElementById('li_email').value.trim(), pw=document.getElementById('li_pw').value;
  document.getElementById('li_err').style.display='none';
  if(!email||!pw){showErr('li_err','Enter your email and password.');return;}
  const btn=document.getElementById('li_btn'); btn.textContent='Logging in…'; btn.disabled=true;
  try { await window.fbFns.signInWithEmailAndPassword(window.fbAuth,email,pw); }
  catch(e){ btn.textContent='Log In to ChukaConnect'; btn.disabled=false; showErr('li_err','Wrong email or password. Try again.'); }
}

async function doSignUp() {
  const fn=document.getElementById('su_fn').value.trim(), ln=document.getElementById('su_ln').value.trim();
  const email=document.getElementById('su_email').value.trim(), pw=document.getElementById('su_pw').value;
  const phone=document.getElementById('su_phone').value.trim(), role=document.getElementById('su_role').value;
  document.getElementById('su_err').style.display='none';
  if(!fn||!email||!pw){showErr('su_err','First name, email and password are required.');return;}
  if(pw.length<6){showErr('su_err','Password must be at least 6 characters.');return;}
  const btn=document.getElementById('su_btn'); btn.textContent='Creating…'; btn.disabled=true;
  try {
    const cred = await window.fbFns.createUserWithEmailAndPassword(window.fbAuth,email,pw);
    const data = {uid:cred.user.uid,name:fn+' '+ln,email,phone,role,createdAt:window.fbFns.serverTimestamp()};
    await window.fbFns.addDoc(window.fbFns.collection(window.fbDb,'users'),data);
    window.currentUser = data;
    showToast('🎉','Welcome!',`Hello ${fn}, your account is ready!`);
  } catch(e){ btn.textContent='Create My Account'; btn.disabled=false; showErr('su_err',e.code==='auth/email-already-in-use'?'Email already registered. Please log in.':e.message); }
}

async function doLogout(){ await window.fbFns.signOut(window.fbAuth); window.currentUser=null; showPage('landing'); showToast('👋','Logged Out','See you next time!'); }

async function loadStudentStats(){
  try{
    const {collection,getDocs,query,where}=window.fbFns, db=window.fbDb;
    const [a,h,b,f]=await Promise.all([
      getDocs(query(collection(db,'listings'),where('status','==','approved'))),
      getDocs(query(collection(db,'listings'),where('status','==','approved'),where('category','==','hostel'))),
      getDocs(query(collection(db,'listings'),where('status','==','approved'),where('category','==','boda'))),
      getDocs(query(collection(db,'listings'),where('status','==','approved'),where('category','==','food'))),
    ]);
    document.getElementById('ss1').textContent=a.size;
    document.getElementById('ss2').textContent=h.size;
    document.getElementById('ss3').textContent=b.size;
    document.getElementById('ss4').textContent=f.size;
  }catch(e){}
}

async function sLoad(cat,gridId){
  const grid=document.getElementById(gridId); if(!grid)return;
  grid.innerHTML=`<div class="loading-block"><div class="spinner"></div></div>`;
  try{
    const {collection,getDocs,query,where,orderBy}=window.fbFns, db=window.fbDb;
    let q;
    if(cat==='all') q=query(collection(db,'listings'),where('status','==','approved'),where('category','!=','hostel'),orderBy('category'),orderBy('createdAt','desc'));
    else q=query(collection(db,'listings'),where('status','==','approved'),where('category','==',cat),orderBy('createdAt','desc'));
    const snap=await getDocs(q);
    const items=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!items.length){grid.innerHTML=`<div class="empty"><div class="ei">${CAT[cat]?.e||'📭'}</div><p>No listings here yet.</p></div>`;return;}
    grid.innerHTML=items.map(l=>studentCard(l)).join('');
  }catch(e){grid.innerHTML=`<div class="empty"><p>Error: ${esc(e.message)}</p></div>`;}
}

function studentCard(l){
  const m=CAT[l.category]||CAT.other;
  const img=l.imageUrl?`<img src="${esc(l.imageUrl)}" alt="${esc(l.name)}" style="width:100%;height:100%;object-fit:cover">`:`<span class="emoji-big">${m.e}</span>`;
  const tags=(l.amenities||[]).slice(0,3).map(a=>`<span style="background:var(--dark3);border:1px solid var(--border);padding:0.1rem 0.45rem;border-radius:5px;font-size:0.63rem;color:var(--text-muted)">${esc(a)}</span>`).join('');
  return `<div class="listing-card">
    <div class="lcard-img" style="background:${m.c}">${img}<span class="pill pill-open">${m.l}</span></div>
    <div class="lcard-body">
      <h4>${esc(l.name)}</h4>
      <p class="lcard-sub">📍 ${esc(l.location||'Nearby')}</p>
      ${l.description?`<p class="lcard-sub">${esc(l.description).substring(0,75)}${l.description.length>75?'…':''}</p>`:''}
      ${tags?`<div style="display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:0.5rem">${tags}</div>`:''}
      ${l.price?`<div style="font-family:'Syne',sans-serif;font-weight:700;color:var(--primary);font-size:0.9rem">KSh ${esc(String(l.price))}<span style="font-size:0.68rem;font-weight:400;color:var(--text-muted)">/mo</span></div>`:''}
      ${l.delivery?`<div style="font-size:0.7rem;color:var(--accent);margin-top:0.25rem">🛵 Delivery Available</div>`:''}
      ${l.phone?`<button class="btn btn-primary btn-sm" style="width:100%;margin-top:0.75rem;justify-content:center" onclick="window.location='tel:${esc(l.phone)}'">📞 ${esc(l.phone)}</button>`:''}
    </div>
  </div>`;
}

async function loadBizStats(){
  try{
    const {collection,getDocs,query,where}=window.fbFns, db=window.fbDb, uid=window.currentUser.uid;
    const all=await getDocs(query(collection(db,'listings'),where('ownerUid','==',uid)));

async function loadMyListings(){
  const grid=document.getElementById('b-lgrid');
  grid.innerHTML=`<div class="loading-block"><div class="spinner"></div></div>`;
  try{
    const {collection,getDocs,query,where,orderBy}=window.fbFns, db=window.fbDb;
    const q=query(collection(db,'listings'),where('ownerUid','==',window.currentUser.uid),orderBy('createdAt','desc'));
    const snap=await getDocs(q);
    const items=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!items.length){grid.innerHTML=`<div class="empty"><div class="ei">📭</div><p>No listings yet.</p><button class="btn btn-primary" onclick="showPanel('b-add',null)">➕ Add Your First Listing</button></div>`;return;}
    grid.innerHTML=items.map(l=>{
      const m=CAT[l.category]||CAT.other;
      const img=l.imageUrl?`<img src="${esc(l.imageUrl)}" style="width:100%;height:100%;object-fit:cover">`:`<span class="emoji-big">${m.e}</span>`;
      const sc=l.status==='approved'?'pill-approved':l.status==='rejected'?'pill-rejected':'pill-pending';
      const sl=l.status==='approved'?'✅ Live':l.status==='rejected'?'❌ Rejected':'⏳ Pending';
      return `<div class="listing-card">
        <div class="lcard-img" style="background:${m.c}">${img}<span class="pill ${sc}">${sl}</span></div>
        <div class="lcard-body">
          <h4>${esc(l.name)}</h4>
          <p class="lcard-sub">${m.l} · 📍 ${esc(l.location||'')}</p>
          ${l.status==='pending'?`<p style="font-size:0.78rem;color:var(--orange);margin:0.4rem 0">⏳ Waiting for admin review</p>`:''}
          ${l.status==='approved'?`<p style="font-size:0.78rem;color:var(--green);margin:0.4rem 0">✅ Visible to all students</p>`:''}
          ${l.status==='rejected'?`<p style="font-size:0.78rem;color:var(--red);margin:0.4rem 0">❌ Not approved. Contact admin.</p>`:''}
          <div class="lcard-actions"><button class="btn btn-red btn-sm" onclick="delListing('${l.id}')">🗑️ Delete</button></div>
        </div>
      </div>`;
    }).join('');
  }catch(e){grid.innerHTML=`<div class="empty"><p>Error: ${esc(e.message)}</p></div>`;}
}

  const name=document.getElementById('al_name').value.trim(), cat=document.getElementById('al_cat').value;

  if(!name||!loc||!phone){showToast('⚠️','Missing Fields','Name, location and phone are required.');return;}
  const btn=document.getElementById('al_btn'); btn.textContent='⏳ Submitting…'; btn.disabled=true;
  try{
    let imageUrl='';
    const f=document.getElementById('al_img').files[0];
    if(f) imageUrl=await cloudUpload(f,'al_pb','al_pl','al_pw');
    const amenities=[...document.querySelectorAll('.alamen:checked')].map(c=>c.value);
    const {collection,addDoc,serverTimestamp}=window.fbFns;
    await addDoc(window.fbFns.collection(window.fbDb,'listings'),{
      name,category:cat,description:document.getElementById('al_desc').value.trim(),
      location:loc,phone,price:document.getElementById('al_price').value||'',
      till:document.getElementById('al_till').value.trim(),
      roomType:document.getElementById('al_room')?.value||'',amenities,
      delivery:document.getElementById('al_del').checked,imageUrl,
      status:'pending',ownerUid:window.currentUser.uid,ownerName:window.currentUser.name,
      createdAt:serverTimestamp()
    });
    ['al_name','al_desc','al_loc','al_phone','al_price','al_till'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('al_prev').style.display='none';
    btn.textContent='🚀 Submit for Approval'; btn.disabled=false;
    showToast('🎉','Submitted!','Admin will review your listing shortly.');
    loadBizStats();
  }catch(e){btn.textContent='🚀 Submit for Approval';btn.disabled=false;showToast('❌','Error',e.message);}
}

async function delListing(id){

function adminCard(l){
  const m=CAT[l.category]||CAT.other;
  const img=l.imageUrl?`<img src="${esc(l.imageUrl)}" style="width:100%;height:100%;object-fit:cover">`:`<span class="emoji-big">${m.e}</span>`;
  const sc=l.status==='approved'?'pill-approved':l.status==='rejected'?'pill-rejected':'pill-pending';
  const sl=l.status==='approved'?'✅ Approved':l.status==='rejected'?'❌ Rejected':'⏳ Pending';
  return `<div class="listing-card">
    <div class="lcard-img" style="background:${m.c}">${img}<span class="pill ${sc}">${sl}</span></div>
    <div class="lcard-body">
      <h4>${esc(l.name)}</h4>
      <p class="lcard-sub">${m.l} · 📍 ${esc(l.location||'')}</p>
      <p class="lcard-sub">👤 ${esc(l.ownerName||'Unknown')} · 📞 ${esc(l.phone||'—')}</p>
      ${l.description?`<p class="lcard-sub">${esc(l.description).substring(0,60)}</p>`:''}
      <div class="lcard-actions">
        ${l.status!=='approved'?`<button class="btn btn-green btn-sm" onclick="setStatus('${l.id}','approved')">✅ Approve</button>`:''}
        ${l.status!=='rejected'?`<button class="btn btn-red btn-sm" onclick="setStatus('${l.id}','rejected')">❌ Reject</button>`:''}
        <button class="btn btn-outline btn-sm" onclick="adminDel('${l.id}')">🗑️</button>
      </div>
    </div>
  </div>`;
}

// ══ CLOUDINARY ══
async function cloudUpload(file,barId,labelId,wrapId){
  if(file.size>5*1024*1024)throw new Error('Image too large. Max 5MB.');
  document.getElementById(wrapId).style.display='block';
  document.getElementById(barId).style.width='10%';
  document.getElementById(labelId).textContent='Uploading photo…';
  const fd=new FormData(); fd.append('file',file); fd.append('upload_preset',CP); fd.append('folder','chukaconnect');
  let pct=10;
  const t=setInterval(()=>{pct=Math.min(pct+8,85);document.getElementById(barId).style.width=pct+'%';},300);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CC}/image/upload`,{method:'POST',body:fd});
  clearInterval(t);
  if(!res.ok)throw new Error('Photo upload failed. Check Cloudinary preset is Unsigned.');
  const data=await res.json();
  document.getElementById(barId).style.width='100%';
  document.getElementById(labelId).textContent='✅ Uploaded!';
  return data.secure_url;
}

function prevImg(inputId,previewId){
  const f=document.getElementById(inputId)?.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=e=>{const el=document.getElementById(previewId);if(el){el.src=e.target.result;el.style.display='block';}};
  r.readAsDataURL(f);
}
</script>
